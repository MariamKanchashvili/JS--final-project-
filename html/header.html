<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <link rel="stylesheet" href="../css/header/header_style.css">
       <link rel="stylesheet" href="../css/font.css">
   <link rel="stylesheet" href="../css/variables_style/variables_style.css">

 
</head>
<body>
    <header class="header">

    <div class="header__logo">
        <p><a href="./home_index.html">Digital</a></p>
        <p class="coloredP"><a href="./home_index.html">Store</a></p>
    </div>

    <div class="header__search">
        <input type="text"
         placeholder="search" 
         name="keywords"
         id="searchInput">

       <div id="searchList"></div>
    <button id="searchBtn"><img src="../assets/icons/magnifying-glass-find-search-svgrepo-com.svg" class="header__search header__search--icon"></button>
    </div>
  <div class="header__auth">

    <div class="header__signup"
         onclick="window.location.href='http://127.0.0.1:5500/html/signUp_index.html'">

        <img src="../assets/icons/record-svgrepo-com.svg"
             class="header__signup header__signup--icon">

        <p>Sign up</p>

    </div>

    <div class="header__login"
         onclick="window.location.href='http://127.0.0.1:5500/html/logIn_index.html'">

        <img src="../assets/icons/personal-account-account-svgrepo-com.svg"
             class="header__login header__login--icon">

        <p>Log In</p>

    </div>

    <!-- BURGER -->
    <div class="header__burger">
        <img
            id="burgerIcon"
            class="header__burger--icon"
            src="../assets/icons/hamburger-menu-more-svgrepo-com.svg"
            alt="burger">
    </div>

    <!-- MOBILE MENU -->
    <div class="header__mobile-menu">

        <div class="header__mobile-signup"
             onclick="window.location.href='http://127.0.0.1:5500/html/signUp_index.html'">

            <p>Sign Up</p>

        </div>

        <div class="header__mobile-login"
             onclick="window.location.href='http://127.0.0.1:5500/html/logIn_index.html'">

            <p>Log In</p>

        </div>
          <div class="header__mobile-shop"
             onclick="window.location.href='http://127.0.0.1:5500/html/shop_index.html'">

            <p>Shop</p>

        </div>

    </div>

</div>
    </header>




    
<script src="../js/header_script.js"></script>

</body>
</html>
