<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="../css/logIn_style/logIn_style.css">
</head>
<body>
 <!-- sign in -->
  <div class="signIn_formbox">
<div class="signIn_title">
    <h3>Sign</h3>
    <span>In</span>
</div>
 
<form id="signin-form" class="signIn_form">

<label for="signin-email" class="email-label"> Email</label>

 <input 
 type="email" 
 id="signin-email" 
 placeholder="your email" 
 name="email"
 class="email-input">

<label for="signin-password" class="password-label"> Password</label>

 <input 
 type="text" 
 id="signin-password" 
 placeholder="your password" 
 name="password"
 class="password-input"
 >
 <button  type="submit"  class="form-submit">Sign in </button>

 <div class="signIn__help">
    <button class="helpBtn">Don`t have an account? Signup now</button>
    <button class="helpBtn"> Forgot password? click to recover</button>
 </div>
</form> 

</div>
<script src="../js/logIn_script.js"></script>
</body>
</html>
