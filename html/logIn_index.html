<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="../css/logIn_style/logIn_style.css">
       <link rel="stylesheet" href="../css/font.css">
   <link rel="stylesheet" href="../css/variables_style/variables_style.css">
   <link rel="stylesheet" href="../css/header/header_style.css">
   <link rel="stylesheet" href="../css/footer/footer_style.css">
 <link rel="stylesheet" href="../css/alert/alert.css">
</head>
<body>
      <header class="header">

    <div class="header__logo"  onclick="window.location.href='home_index.html'">
        <p><a href="./home_index.html">Digital</a></p>
        <p class="coloredP"><a href="./home_index.html">Store</a></p>
    </div>

    <div class="header__search">
        <input type="text"
         placeholder="search" 
         name="keywords"
         id="searchInput">

       <div id="searchList"></div>
    <button id="searchBtn"><img src="../assets/icons/magnifying-glass-find-search-svgrepo-com.svg" class="header__search header__search--icon"></button>
    </div>
  <div class="header__auth">

    <div class="header__signup"
         onclick="window.location.href='signUp_index.html'">

        <img src="../assets/icons/record-svgrepo-com.svg"
             class="header__signup header__signup--icon">

        <p>Sign up</p>

    </div>

    <div class="header__login"
         onclick="window.location.href='logIn_index.html'">

        <img src="../assets/icons/personal-account-account-svgrepo-com.svg"
             class="header__login header__login--icon">

        <p>Log In</p>

    </div>

    <!-- BURGER -->
    <div class="header__burger">
        <img
            id="burgerIcon"
            class="header__burger--icon"
            src="../assets/icons/hamburger-menu-more-svgrepo-com.svg"
            alt="burger">
    </div>

    <!-- MOBILE MENU -->
    <div class="header__mobile-menu">

        <div class="header__mobile-signup"
             onclick="window.location.href='signUp_index.html'">

            <p>Sign Up</p>

        </div>

        <div class="header__mobile-login"
             onclick="window.location.href='logIn_index.html'">

            <p>Log In</p>

        </div>
          <div class="header__mobile-shop"
             onclick="window.location.href='shop_index.html'">

            <p>Shop</p>

        </div>

    </div>

</div>
    </header>


 <!-- sign in -->
  <div class="signIn_formbox">
<div class="signIn_title">
    <h3>Sign</h3>
    <span>In</span>
</div>
 
<form id="signin-form" class="signIn_form">

<label for="signin-email" class="email-label"> Email</label>

 <input 
 type="email" 
 id="signin-email" 
 placeholder="your email" 
 name="email"
 class="email-input">

<label for="signin-password" class="password-label"> Password</label>

 <input 
 type="text" 
 id="signin-password" 
 placeholder="your password" 
 name="password"
 class="password-input"
 >
 <button  type="submit"  class="form-submit">Sign in </button>

 <div class="signIn__help">
    <button class="helpBtn"> <a href="./signUp_index.html">Don`t have an account? Signup now</a></button>
    <button class="helpBtn"><a href="./recoverPass.html">Forgot password? click to recover</a> </button>
 </div>
</form> 

</div>
<!-- FOOTER  -->
<footer class="footer">
        <div class="footer__wrapper">
        <div class="footer__header">NEED A HAND?</div>
        <div class="footer__side1">
        <p class="footer__side1 footer__side1--contact">Contact Us</p>
         <a href="#" target="_blank">info@mysite.com</a>
        <p>123-456-7890</p>
        <span>1100 Upton Avenue Fryeburg, Maine</span>    
        </div>      
    <div class="footer__map"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.8252127637234!2d-122.3905430238613!3d37.770696371986446!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808f7fc51755cf9b%3A0xfb7feafb9a268753!2s500%20Terry%20Francine%20Street%2C%20San%20Francisco%2C%20CA%2094158!5e0!3m2!1sen!2sus!4v1775675989195!5m2!1sen!2sus" width="400" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
    </div>
    <form class="footer__form">

    <div class="footer__form-row">

        <div class="footer__form-item">
            <label>First name *</label>
            <input type="text" required>
        </div>

        <div class="footer__form-item">
            <label>Last name *</label>
            <input type="text" required>
        </div>

    </div>

    <div class="footer__form-row">

        <div class="footer__form-item">
            <label>Email *</label>
            <input type="email" required>
        </div>

        <div class="footer__form-item">
            <label>Phone</label>
            <input type="tel">
        </div>

    </div>

    <div class="footer__form-item footer__form-item--message">
        <label>Leave us a message</label>
        <textarea></textarea>
    </div>

    <button type="submit" class="footer__btn">
        Submit
    </button>

</form>
    </footer>  
<script src="../js/logIn_script.js"></script>
<script src="../js/header_script.js"></script>
<script src="../js/text_shop_script.js"></script>
<script src="../js/cart_script.js"></script>
<script src="../js/ai_script.js"></script>
<script src="../js/alert.js"></script>
</body>
</html>
