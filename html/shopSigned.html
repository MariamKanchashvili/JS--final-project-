<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop signed</title>
    <link rel="stylesheet" href="../css/header/header_style.css">
    <link rel="stylesheet" href="../css/footer/footer_style.css">
    <link rel="stylesheet" href="../css/font.css">
    <link rel="stylesheet" href="../css/variables_style/variables_style.css">
    <link rel="stylesheet" href="../css/user_style/user_style.css">
    <link rel="stylesheet" href="../css/shop_style/shop_style.css"> 
    <link rel="stylesheet" href="../css/cart_style/cart_style.css">

</head>
<body>
  <!-- header -->
      <header class="header">

    <div class="header__logo" onclick="window.location.href='http://127.0.0.1:5500/html/home_signed.html'" >
        <p>Digital</p>
        <p class="coloredP">Store</p>
    </div>

    <div class="header__search" >
          <input type="text"
         placeholder="search" 
         name="keywords"
         id="searchInput">

       <div id="searchList"></div>
    <button id="searchBtn"><img src="../assets/icons/magnifying-glass-find-search-svgrepo-com.svg" class="header__search header__search--icon"></button>
    </div>
    <div class="header__auth">
  

    <div class="header__login" onclick="window.location.href='http://127.0.0.1:5500/html/user_index.html'">
        <img src="../assets/icons/personal-account-account-svgrepo-com.svg" class="header__login header__login--icon">

    </div>
  
    <button onclick="window.location.href='cart_index.html'" class="cart-image-btn">
      <div class="cart-badge-wrapper">
        <img src="../assets/icons/cart-svgrepo-com (1).svg" alt="cart" class="cart-image">
        <span class="global-cart-count">0</span>
      </div>
    </button>
        <button onclick="window.location.href='shopSigned.html'" class="shop-image-btn"><img src="../assets/icons/store-homepage-home-svgrepo-com.svg" alt="shop icon"></button>
        <button id="logotBtn">  <img src="../assets/icons/logout-svgrepo-com.svg" alt="log out">Log Out</button>
        <!-- burger icon  -->
<div class="header__burger">
        <img
            id="burgerIcon"
            class="header__burger--icon"
            src="../assets/icons/hamburger-menu-more-svgrepo-com.svg"
            alt="burger">
    </div>

    <!-- MOBILE MENU -->

        <div class="header__mobile-menu">

            <div class="header__mobile-user"
     onclick="window.location.href='http://127.0.0.1:5500/html/user_index.html'">

    <img
        src="../assets/icons/personal-account-account-svgrepo-com.svg"
        class="header__mobile-user-icon">

</div>

            <div class="header__mobile-cart"
                 onclick="window.location.href='cart_index.html'">
          <img src="../assets/icons/cart-svgrepo-com (1).svg" alt="cart" class="cart-image">
  <span id="global-cart-count">0</span>
            </div>

            <div class="header__mobile-shop"
                 onclick="window.location.href='shopSigned.html'">
            <img src="../assets/icons/store-homepage-home-svgrepo-com.svg" alt="shop icon">
            </div>

            <div class="header__mobile-logout"
                 id="mobileLogoutBtn">

             <img src="../assets/icons/logout-svgrepo-com.svg" alt="log out">Log Out

            </div>

        </div>

    </div>

    

</header>

        <div class="box">

    

     <div class="products-container">
    <div class="card"> 
      
    </div>
   
     </div>
 
     <aside class="sidebar">
  <h3>Select Product Type</h3>
<div class="store-category">
<button class="categoryBtn" onclick="showAllProducts()">
        All
    </button>
   
    </div>

    
<h3>Choose Filter</h3>
<!-- //search rating -->
    <select  id="rating" class="rating">
        <option value="--">Rating</option>
        <option value="5">5 </option>
        <option value="4">4 </option>
        <option value="3">3 </option>
        <option value="2">2 </option>
        <option value="1">1 </option>
    </select>
    <!-- //search price -->
     <div class="price-search">
    <input type="number" id="minPrice" placeholder="Min Price"  min="0">
    <input type="number" id="maxPrice" placeholder="Max Price"  min="0">
</div>
<!-- //search sort -->
   <select name="" id="sortBy">
    <option value="">No sort</option>
     <option value="price">Price</option>
     <option value="rating">Rating</option>
     <option value="isse_date">Issue date</option>
     <option value="title">title</option>
  
   </select>
   <!-- search sort Direction -->
    <select  id="sortDirection">
        <option value="asc">Low To High</option>
        <option value="desc">High To Low</option>
    </select>

  <select id="aside-menu">
    <option value="" selected>
        Select Brand
    </option>

    <option value="">Any Brand</option>
</select>
    <!-- //search keyword -->
    <input  type="text" id="searchInputAside" placeholder="Search keyword">
    <button id="searchBtnAside">Search </button>
    </aside> 


    <div class="buttons">
        <button id="prev">Prev</button>
        <button class="btn1">1</button>
        <button class="btn1">2</button>
        <button class="btn1">3</button>
        <button class="btn1">4</button>
        <button class="btn1">5</button>
        <button id="next">Next</button>
    </div>


</div>

<!-- footer -->
   <footer class="footer">
        <div class="footer__wrapper">
        <div class="footer__header">NEED A HAND?</div>
        <div class="footer__side1">
        <p class="footer__side1 footer__side1--contact">Contact Us</p>
         <a href="#" target="_blank">info@mysite.com</a>
        <p>123-456-7890</p>
        <span>1100 Upton Avenue Fryeburg, Maine</span>    
        </div>      
    <div class="footer__map"><iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.8252127637234!2d-122.3905430238613!3d37.770696371986446!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808f7fc51755cf9b%3A0xfb7feafb9a268753!2s500%20Terry%20Francine%20Street%2C%20San%20Francisco%2C%20CA%2094158!5e0!3m2!1sen!2sus!4v1775675989195!5m2!1sen!2sus" width="400" height="200" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>
    </div>
    <form class="footer__form">

    <div class="footer__form-row">

        <div class="footer__form-item">
            <label>First name *</label>
            <input type="text" required>
        </div>

        <div class="footer__form-item">
            <label>Last name *</label>
            <input type="text" required>
        </div>

    </div>

    <div class="footer__form-row">

        <div class="footer__form-item">
            <label>Email *</label>
            <input type="email" required>
        </div>

        <div class="footer__form-item">
            <label>Phone</label>
            <input type="tel">
        </div>

    </div>

    <div class="footer__form-item footer__form-item--message">
        <label>Leave us a message</label>
        <textarea></textarea>
    </div>

    <button type="submit" class="footer__btn">
        Submit
    </button>

</form>
    </footer>  
<script src="../js/text_shop_Signed.js"></script>
<script src="../js/cart_script.js"></script>
<script src="../js/header_script.js"></script>
<script src="../js/user_script.js"></script>
</body>
</html>
