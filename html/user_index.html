<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current User</title>
    <link rel="stylesheet" href="../css/user_style/user_style.css">
</head>
<body>
    <button onclick="window.location.href='cart_index.html'">Go to Cart</button>
        <button onclick="window.location.href='shop_index.html'">shop</button>
<div class="user_page">
    <!-- current user -->
     <form class="currentUser-form" id="currentUser_form">
  
 <label for="currentUser-firstname"> Name</label>
 <input type="text" id="currentUser-firstname" placeholder="your name" name="firstName">
    <label for="currentUser-lastname"> Lastname</label>
 <input type="text" id="currentUser-lastname" placeholder="your lastname" name="lastName">
<label for="currentUser-age"> Age</label>
 <input type="number" id="currentUser-age" placeholder="your age" name="age">
<label for="currentUser-email"> Email</label>
 <input type="email" id="currentUser-email" placeholder="your email" name="email">

<label for="currentUser-address"> Address</label>
 <input type="text" id="currentUser-address" placeholder="your address" name="address">
 <label for="currentUser-role"> role</label>
 <input type="text" id="currentUser-role" placeholder="your role" name="role">
<label for="currentUser-zipcode"> Zipcode</label>
 <input type="text"  id="currentUser-zipcode" placeholder="zipcode" name="zipcode">
<label for="currentUser-avatar"> Avatar</label>
 <input type="text"  id="currentUser-avatar" placeholder="avatar" name="avatar">
 <label class="gender" for="gender"> gender</label>
 <div class="gender-input">
 <input type="radio"  value="MALE"  name="gender" class="gender" id="currentUser-gender">Male
 <input type="radio"  value="FEMALE"   name="gender"class="gender">Female
 <input type="radio"  value="OTHER"  name="gender"class="gender">Other
</div>
<label for="currentUser-phone"> Phone</label>
 <input type="text" id="currentUser-phone" placeholder="your phone (including country code)" name="phone">
 <label for="currentUser-verified">verified</label>
 <input type="text" id="currentUser-verified"  >

</form>
<!-- veryfy email -->
 <div class="verify_title">
    <h3>Verify  </h3>
    <span>Email</span>
</div>
 <form id="verify-id">
   
    <input type="email" id="verifyEmail">
    <button type="submit" id="verifyBtn" >Verify</button>
</form>
<!-- Update User Data  -->
  <div class="updateData_formbox">
      <div class="updateData_title">
     <h2>Update user </h2>
     <span>Data</span>
      </div>
 <form id="updateData-form" class="updateData_form">
 
    <label for="updateData-firstname"> Name</label>
 <input type="text" id="updateData-firstname" placeholder="your name" name="firstName">
    <label for="updateData-lastname"> Lastname</label>
 <input type="text" id="updateData-lastname" placeholder="your lastname" name="lastName">
<label for="updateData-age"> Age</label>
 <input type="number" id="updateData-age" placeholder="your age" name="age">
<label for="updateData-email"> Email</label>
 <input type="email" id="updateData-email" placeholder="your email" name="email">
<label for="updateData-address"> Address</label>
 <input type="text" id="updateData-address" placeholder="your address" name="address">
 <label for="updateData-role"> role</label>
 <input type="text" id="updateData-role" placeholder="your role" name="role">
<label for="updateData-phone"> Phone</label>
 <input type="text" id="updateData-phone" placeholder="your phone (including country code)" name="phone">
<label for="updateData-zipcode"> Zipcode</label>
 <input type="text"  id="updateData-zipcode" placeholder="zipcode" name="zipcode">
<label for="updateData-avatar"> Avatar</label>
 <input type="text"  id="updateData-avatar" placeholder="avatar" name="avatar">
 
<label class="gender" for="gender"> Gender</label>
<div class="gender-input">
 <input type="radio"  value="MALE"  name="gender" class="gender" id="gender">Male
 <input type="radio"  value="FEMALE"   name="gender"class="gender">Female
 <input type="radio"  value="OTHER"  name="gender"class="gender">Other
</div>
<br>
<button  class="updateData_Btn"   type="submit">Update user data</button>
 </form>
</div>

<!-- Recovery password  -->
 <div class="recoverPass_title">
     <h2>Change  </h2>
     <span>Password</span>
      </div>

<form id="recoverPass-id">
     
<input type="email" id="recoverPass" placeholder="your email">
    <button type="submit" id="recoverPassBtn" >Recover password</button>
</form>

<!-- change password -->
 <form id="changePass-id">
    <input type="password" id="oldPass" placeholder="Your current password" required>
    <input type="password" id="changePass" placeholder="Your new password" required>
    <button type="submit" id="changePassBtn" >Save new password</button>
</form>

<button id="logotBtn"> Log Out <img src="../assets/icons/logout-svgrepo-com.svg" alt=""></button>
</div>
<script src="../js/user_script.js"></script>
</body>
</html>
